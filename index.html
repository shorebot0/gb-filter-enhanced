
<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="UTF-8">
		<title>shorebot - GB Filter</title>
		<link rel="icon" type="image/png" href="favicon-moon.png"/>
		<link rel="stylesheet" href="common.css">
		<script src="main.js"></script>
		<script src="yrGL.js"></script>
		<script src="yrUtil.js"></script>
		<script src="yrTimer.js"></script>
		<script src="gl-matrix-min.js"></script>
		<script src="imaged.js"></script>
		<script src="gbfilter.js"></script>
		
		<script>canvas.toDataURL('png')</script>
		
	</head>
	<body><script type="text/javascript" charset="utf-8" src="encount.js"></script>
		
		
		
		
		<div class="flex-title" style="max-width: 70%; margin: auto;">
		<h1>GB Filter</h1>
		<input id="input_image" type="file" accept="image/*"/><br>
		<br>
		</div>
		
		<div class="flex-container" id="main" style="margin: auto; max-width: 70%;">
		
			
			
			
			<div class="flex-child">
				<canvas  id="canvas_main" width="640" height="576">canvas</canvas>
			</div>
			
			<div class="flex-child">
				<form name="form_ui">
					Process the image (If unchecked, the original image will be displayed)
					<br>
					<input type="checkbox" name="enable" value="0" checked="checked">
					<br>
					<br>
					Brightness adjustment
					<br>
					Light<input type="range" name="curve" min="20" max="200" step="1" value="70">Dark
					<br>
					<br>
					High gradation
					<br>
					<input type="checkbox" name="hi_tone" value="0" checked="checked">
					<br>
					<br>
					Dot grid
					<br>
					<input type="checkbox" name="grid" value="0">
					<br>
					<br>
					Filter color
					<br>
					Red<input type="range" name="filter_color_r" min="0" max="100" step="1" value="60">
					<br>
					Green<input type="range" name="filter_color_g" min="0" max="100" step="1" value="80">
					<br>
					Blue<input type="range" name="filter_color_b" min="0" max="100" step="1" value="40">
					<br>
					<!-- Download button fix -->
					<!--a href="%dataURL%" download>download</a -->
					<!--a href="#" onclick="generateDownload(this); return true;" download="gameboy_snapshot.png" style="display:inline-block; margin-top:10px; padding:5px 10px; background:#0f380f; color:#9bbc0f; text-decoration:none; border-radius:3px; font-weight:bold;">Download Image</a -->
					<a href="#" onclick="generateDownload(this, event); return false;" download="gameboy_snapshot.png" style="display:inline-block; margin-top:10px; padding:5px 10px; background:#0f380f; color:#9bbc0f; text-decoration:none; border-radius:3px; font-weight:bold;">Download Image</a>
				</form>
				
			</div>
			
		
		<div class="flex-footer">
		  <small style="color:#fff; position: absolute; bottom:10px; left:0; right:0; text-align:center; display:block;">
		    <span style="display:block;">Enhanced by shorebot0.</span>
		    <span style="display:block;">Restyle by <a href="https://github.com/moontorc" target="_blank" style="color:#fff;">Moontorc</a>.</span>
		    <span style="display:block;">Original by <a href="http://yrlab.zatunen.com/webgl/gbpic/gbpic.html" target="_blank" style="color:#fff;">Yunta Robo</a>.</span>
		  </small>
		</div>
			
			
		</div>
		
	</body>
</html>
